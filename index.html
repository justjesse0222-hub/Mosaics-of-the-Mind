<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mosaics of the Mind</title>

<style>
:root {
  --canvas: #b76c34;
  --deep: #9e5128;
  --brown: #74300f;
  --gold: #d2b300;
  --cream: #ead08a;
  --teal: #0e604f;
  --teal2: #177765;
  --sun: #ffe45f;
  --ink: #2b160d;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  background: #7e7e79;
  font-family: Georgia, "Times New Roman", serif;
  overflow: hidden;
}

.app {
  position: relative;
  width: min(100vw, 430px);
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 88% 5%, rgba(14, 96, 79, 0.52) 0 18%, transparent 19%),
    radial-gradient(circle at -10% 82%, rgba(116, 48, 15, 0.65) 0 18%, transparent 19%),
    linear-gradient(180deg, var(--canvas), var(--deep));
}

.app::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0.28;
  pointer-events: none;
  background-image:
    repeating-linear-gradient(13deg, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px 6px),
    repeating-linear-gradient(94deg, rgba(36, 18, 8, 0.17) 0 1px, transparent 1px 9px);
  mix-blend-mode: soft-light;
}

.top {
  position: absolute;
  top: 28px;
  left: 22px;
  right: 92px;
  z-index: 5;
}

.brand {
  margin: 0;
  color: var(--brown);
  font-size: clamp(2.1rem, 11vw, 3.5rem);
  line-height: 0.78;
  font-weight: 700;
  letter-spacing: -0.055em;
  text-shadow: 0 2px 0 rgba(234, 208, 138, 0.18);
}

.brand span {
  font-size: 0.42em;
  letter-spacing: 0;
}

.slogan {
  margin-top: 12px;
  max-width: 245px;
  font-size: clamp(1rem, 4.7vw, 1.4rem);
  font-style: italic;
  line-height: 1.05;
  color: rgba(35, 20, 13, 0.9);
}

#toggle {
  display: none;
}

.tinker {
  position: absolute;
  top: 40px;
  right: 22px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  z-index: 8;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 35% 28%, #fff5a8 0 14%, transparent 15%),
    var(--sun);
  color: var(--brown);
  font-size: 2rem;
  box-shadow:
    0 0 16px rgba(255, 228, 95, 0.9),
    0 0 34px rgba(255, 228, 95, 0.42);
  animation: heart 1.45s ease-in-out infinite;
}

.menu {
  display: none;
  position: absolute;
  top: 112px;
  right: 18px;
  width: 194px;
  padding: 12px;
  border-radius: 20px;
  background: rgba(54, 26, 14, 0.86);
  box-shadow: 0 14px 30px rgba(41, 18, 8, 0.3);
  z-index: 9;
}

.menu button {
  width: 100%;
  margin: 5px 0;
  border: 1px solid rgba(255, 232, 145, 0.5);
  border-radius: 14px;
  padding: 11px 10px;
  color: #ffe9b8;
  background: rgba(210, 179, 0, 0.18);
  font-size: 0.88rem;
}

#toggle:checked ~ .menu {
  display: block;
}

.arch-space {
  position: absolute;
  left: 0;
  right: 0;
  bottom: -10px;
  height: 66vh;
  z-index: 3;
}

.arch {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: 74%;
  height: 100%;
  border-radius: 999px 999px 0 0;
  border: 15px solid var(--brown);
  border-bottom: 0;
  filter: drop-shadow(0 0 13px rgba(255, 228, 95, 0.28));
  animation: glow 3.5s ease-in-out infinite;
}

.arch::before {
  content: "";
  position: absolute;
  inset: 15px;
  border-radius: 999px 999px 0 0;
  border: 31px solid var(--gold);
  border-bottom: 0;
}

.arch::after {
  content: "";
  position: absolute;
  inset: 60px;
  border-radius: 999px 999px 0 0;
  border: 22px solid var(--teal);
  border-bottom: 0;
  box-shadow: 0 0 0 16px var(--cream);
}

.horizon {
  position: absolute;
  left: 50%;
  top: 26px;
  transform: translateX(-50%) rotate(-4deg);
  z-index: 4;
  color: var(--brown);
  font-size: clamp(1.18rem, 6vw, 1.85rem);
  font-style: italic;
  white-space: nowrap;
}

.unfold-zone {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 190px;
  height: 190px;
  display: grid;
  place-items: center;
  z-index: 6;
}

.ring {
  position: absolute;
  border: 3px solid var(--teal2);
  border-left-color: transparent;
  border-right-color: transparent;
  border-radius: 50%;
  opacity: 0.72;
  transform: rotate(-8deg);
  animation: ring 3.2s ease-in-out infinite;
}

.r1 {
  width: 162px;
  height: 104px;
}

.r2 {
  width: 198px;
  height: 136px;
  animation-delay: 0.35s;
  opacity: 0.55;
}

.r3 {
  width: 128px;
  height: 82px;
  animation-delay: 0.7s;
  opacity: 0.84;
}

.unfold {
  position: relative;
  width: 128px;
  height: 128px;
  border: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 33% 25%, rgba(255, 255, 255, 0.11), transparent 22%),
    var(--teal);
  color: #c99b86;
  font-size: 1.85rem;
  font-family: Georgia, "Times New Roman", serif;
  font-style: italic;
  box-shadow:
    0 14px 28px rgba(42, 19, 8, 0.28),
    inset 0 0 20px rgba(255, 255, 255, 0.07);
  animation: breathe 3.2s ease-in-out infinite;
}

@keyframes breathe {
  0%,
  100% {
    transform: scale(1);
  }

  50% {
    transform: scale(1.055);
    box-shadow:
      0 18px 34px rgba(42, 19, 8, 0.3),
      0 0 26px rgba(14, 96, 79, 0.34);
  }
}

@keyframes ring {
  0%,
  100% {
    transform: rotate(-8deg) scale(0.94);
    opacity: 0.46;
  }

  50% {
    transform: rotate(-8deg) scale(1.08);
    opacity: 0.9;
  }
}

@keyframes heart {
  0%,
  100% {
    transform: scale(1);
  }

  18% {
    transform: scale(1.12);
  }

  30% {
    transform: scale(0.98);
  }

  44% {
    transform: scale(1.08);
  }

  62% {
    transform: scale(1);
  }
}

@keyframes glow {
  0%,
  100% {
    filter: drop-shadow(0 0 10px rgba(255, 228, 95, 0.24));
  }

  50% {
    filter: drop-shadow(0 0 22px rgba(255, 228, 95, 0.48));
  }
}
</style>
</head>

<body>
<main class="app">
  <input id="toggle" type="checkbox" />

  <section class="top">
    <h1 class="brand">
      Mosaics<br>
      <span>of the</span> Mind
    </h1>

    <div class="slogan">
      a place to create your peace of mind
    </div>
  </section>

  <label class="tinker" for="toggle">
    ⚙
  </label>

  <div class="menu">
    <button>Customization</button>
    <button>Settings</button>
  </div>

  <section class="arch-space">
    <div class="arch"></div>
    <div class="horizon">My Horizon</div>
  </section>

  <section class="unfold-zone">
    <div class="ring r2"></div>
    <div class="ring r1"></div>
    <div class="ring r3"></div>
    <button class="unfold">Unfold</button>
  </section>
</main>
</body>
</html>
