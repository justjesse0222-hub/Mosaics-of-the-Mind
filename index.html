<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaics of the Mind</title>

  <style>
    :root {
      --background: #9b5f46;
      --background-dark: #7d4638;
      --arch-outer: #a95d36;
      --arch-main: #d49a39;
      --arch-inner: #efbe5a;
      --teal: #4f8c83;
      --teal-dark: #356b66;
      --cream: #ffe3b7;
      --brown: #5d3329;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--background);
      color: var(--cream);
    }

    body {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .app {
      position: relative;
      width: min(100vw, 430px);
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 215, 148, 0.1), transparent 26%),
        radial-gradient(circle at 85% 10%, rgba(255, 231, 180, 0.09), transparent 24%),
        linear-gradient(180deg, #a8664a 0%, #92553f 55%, #7b4436 100%);
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        repeating-radial-gradient(circle at 0 0, rgba(255,255,255,.22) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 1px, transparent 1px 7px);
      pointer-events: none;
    }

    .arch-wrap {
      position: absolute;
      left: 50%;
      top: 56px;
      transform: translateX(-50%);
      width: 86%;
      height: 78%;
      border-radius: 999px 999px 28px 28px;
      background: var(--arch-outer);
      padding: 18px;
      box-shadow:
        inset 0 0 0 2px rgba(92, 47, 31, 0.18),
        0 22px 45px rgba(62, 30, 24, 0.25);
    }

    .arch-main {
      width: 100%;
      height: 100%;
      border-radius: 999px 999px 22px 22px;
      background: var(--arch-main);
      padding: 22px;
      box-shadow: inset 0 0 22px rgba(255, 235, 168, 0.24);
    }

    .arch-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 999px 999px 16px 16px;
      background: linear-gradient(180deg, #f0bb51 0%, #df993a 52%, #c67734 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 72px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 11vw, 3.4rem);
      line-height: 0.92;
      font-weight: 500;
      color: #ffe9bd;
      text-shadow:
        0 0 9px rgba(255, 239, 187, 0.9),
        0 3px 0 rgba(103, 52, 37, 0.18);
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin-top: 8px;
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(93, 51, 41, 0.62);
    }

    .unfold {
      margin-top: 64px;
      width: 148px;
      aspect-ratio: 1;
      border: none;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 246, 203, 0.35), transparent 22%),
        linear-gradient(145deg, var(--teal), var(--teal-dark));
      color: #fff1cf;
      font-size: 1.35rem;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: 0.04em;
      box-shadow:
        0 18px 28px rgba(55, 38, 30, 0.28),
        inset 0 -8px 14px rgba(32, 71, 68, 0.38);
      cursor: pointer;
    }

    .home-note {
      position: absolute;
      bottom: 112px;
      width: 72%;
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      color: rgba(255, 237, 204, 0.72);
      line-height: 1.5;
    }

    .tinker-area {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 5;
    }

    .tinker-menu {
      display: none;
      width: min(78%, 310px);
      padding: 12px;
      border-radius: 24px;
      background: rgba(84, 43, 35, 0.72);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 30px rgba(47, 25, 21, 0.26);
    }

    .tinker-menu.open {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      animation: lift 180ms ease-out;
    }

    .menu-option {
      border: 1px solid rgba(255, 224, 170, 0.38);
      border-radius: 18px;
      padding: 12px 8px;
      color: #ffe6b7;
      background: rgba(210, 139, 63, 0.42);
      font-family: Arial, sans-serif;
      font-size: 0.86rem;
      cursor: pointer;
    }

    .tinker {
      width: 84px;
      aspect-ratio: 1;
      border: none;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 245, 194, 0.72), transparent 18%),
        radial-gradient(circle at 54% 62%, #d69a44, #9b5b38 72%);
      color: #fff2c9;
      font-family: Arial, sans-serif;
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow:
        0 0 22px rgba(239, 190, 90, 0.7),
        0 12px 25px rgba(43, 22, 18, 0.35);
      cursor: pointer;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 225, 165, 0.55);
      box-shadow: 0 0 12px rgba(255, 225, 165, 0.72);
    }

    .spark.one {
      top: 13%;
      left: 12%;
    }

    .spark.two {
      top: 28%;
      right: 10%;
      width: 5px;
      height: 5px;
    }

    .spark.three {
      bottom: 18%;
      left: 20%;
      width: 6px;
      height: 6px;
    }

    @keyframes lift {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>
  <main class="app" aria-label="Mosaics of the Mind home screen">
    <div class="grain"></div>

    <span class="spark one"></span>
    <span class="spark two"></span>
    <span class="spark three"></span>

    <section class="arch-wrap">
      <div class="arch-main">
        <div class="arch-inner">
          <h1>My<br />Horizon</h1>
          <div class="subtitle">Mosaics of the Mind</div>

          <button class="unfold" type="button">
            Unfold
          </button>

          <p class="home-note">
            A soft doorway for thoughts, tasks, notes, and the little life-tiles that need somewhere to land.
          </p>
        </div>
      </div>
    </section>

    <section class="tinker-area" aria-label="Tinker menu area">
      <div class="tinker-menu" id="tinkerMenu">
        <button class="menu-option" type="button">Customization</button>
        <button class="menu-option" type="button">Settings</button>
      </div>

      <button
        class="tinker"
        id="tinkerButton"
        type="button"
        aria-expanded="false"
        aria-controls="tinkerMenu"
      >
        Tinker
      </button>
    </section>
  </main>

  <script>
    const tinkerButton = document.getElementById("tinkerButton");
    const tinkerMenu = document.getElementById("tinkerMenu");

    tinkerButton.addEventListener("click", () => {
      const isOpen = tinkerMenu.classList.toggle("open");
      tinkerButton.setAttribute("aria-expanded", String(isOpen));
    });
  </script>
</body>
</html>
