<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mosaics of the Mind</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Modak&family=Shrikhand&display=swap");

:root {
  --black: #0f0f0f;
  --dark-gray: #333333;
  --mid-gray: #777777;
  --light-gray: #d9d9d9;
  --white: #ffffff;
  --page-gray: #b9b9b9;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  overflow: hidden;
  background: #111;
  font-family: Georgia, "Times New Roman", serif;
}

.app {
  position: relative;
  width: min(100vw, 430px);
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.45), transparent 28%),
    radial-gradient(circle at 82% 76%, rgba(0,0,0,0.18), transparent 34%),
    linear-gradient(145deg, #d4d4d4, #9f9f9f);
  color: var(--black);
}

.app::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.22;
  background-image:
    repeating-linear-gradient(
      24deg,
      rgba(255,255,255,0.45) 0 1px,
      transparent 1px 7px
    ),
    repeating-linear-gradient(
      104deg,
      rgba(0,0,0,0.18) 0 1px,
      transparent 1px 9px
    );
  mix-blend-mode: soft-light;
}

/* TOP TITLE AREA */

.top-section {
  position: absolute;
  top: 0;
  left: 0;
  width: calc(100% - 92px);
  height: 25vh;
  z-index: 5;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  padding-left: 14px;
  padding-right: 4px;
  text-align: center;
}

.app-title {
  margin: 0;
  color: var(--black);
  font-family: "Modak", "Cooper Black", "Arial Rounded MT Bold", Georgia, serif;
  font-size: clamp(2.55rem, 13vw, 4.35rem);
  line-height: 0.76;
  letter-spacing: 0.01em;
  font-weight: 400;
  transform: translateX(-5px);
  text-shadow:
    2px 2px 0 var(--white),
    4px 5px 0 rgba(0,0,0,0.18);
}

.app-title .small-words {
  display: inline-block;
  font-size: 0.38em;
  transform: translateY(-0.08em);
}

.app-slogan {
  margin-top: 8px;
  max-width: 290px;
  color: var(--dark-gray);
  font-family: "Shrikhand", Georgia, serif;
  font-size: clamp(0.72rem, 3.1vw, 0.94rem);
  line-height: 1.15;
  transform: translateX(-5px);
}

/* TINKER TOOL */

#tinker-toggle {
  display: none;
}

.tinker-button {
  position: absolute;
  top: 22px;
  right: 18px;
  width: 64px;
  height: 64px;
  z-index: 10;

  display: grid;
  place-items: center;

  border-radius: 50%;
  border: 2px solid var(--white);
  background:
    radial-gradient(circle at 32% 24%, var(--white) 0 14%, transparent 15%),
    radial-gradient(circle, #f2f2f2 0 56%, #9a9a9a 57% 100%);
  color: var(--black);

  font-size: 2rem;
  line-height: 1;
  cursor: pointer;

  box-shadow:
    0 0 12px rgba(255,255,255,0.95),
    0 0 28px rgba(255,255,255,0.55),
    0 10px 18px rgba(0,0,0,0.24);

  animation: heartbeatPulse 1.55s ease-in-out infinite;
}

.tinker-menu {
  display: none;
  position: absolute;
  top: 96px;
  right: 14px;
  width: 190px;
  padding: 12px;
  z-index: 11;

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.65);
  background: rgba(25,25,25,0.9);
  box-shadow: 0 14px 30px rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
}

.tinker-menu button {
  width: 100%;
  margin: 5px 0;
  padding: 11px 10px;

  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.12);
  color: var(--white);

  font-size: 0.9rem;
  font-family: Georgia, "Times New Roman", serif;
}

#tinker-toggle:checked ~ .tinker-menu {
  display: block;
}

/* BOTTOM HOME AREA */

.bottom-section {
  position: absolute;
  left: 0;
  right: 0;
  top: 25vh;
  bottom: 0;
  z-index: 3;
}

/* MY HORIZONS ARCH */

.arch-link {
  position: absolute;
  inset: 0;
  display: block;
  z-index: 4;
  text-decoration: none;
}

.arch-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.arch-glow-path {
  fill: none;
  stroke: rgba(255,255,255,0.82);
  stroke-width: 112;
  stroke-linecap: butt;
  stroke-linejoin: round;
  filter: blur(13px);
  opacity: 0.62;
  animation: archGlow 3.8s ease-in-out infinite;
}

.arch-band-outer,
.arch-band-middle,
.arch-band-inner {
  fill: none;
  stroke-linecap: butt;
  stroke-linejoin: round;
}

.arch-band-outer {
  stroke: var(--black);
  stroke-width: 78;
}

.arch-band-middle {
  stroke: var(--mid-gray);
  stroke-width: 52;
}

.arch-band-inner {
  stroke: var(--white);
  stroke-width: 26;
}

.arch-text {
  fill: var(--black);
  font-family: "Shrikhand", Georgia, serif;
  font-size: 21px;
  letter-spacing: 1.4px;
  paint-order: stroke;
  stroke: var(--white);
  stroke-width: 3px;
}

/* MOON BUTTON */

.moon-link {
  position: absolute;
  left: 50%;
  top: 54%;
  transform: translate(-50%, -50%);
  z-index: 7;

  width: 96px;
  height: 96px;

  display: grid;
  place-items: center;

  border-radius: 50%;
  border: 2px solid var(--black);
  background:
    radial-gradient(circle at 32% 24%, rgba(255,255,255,0.6), transparent 22%),
    radial-gradient(circle, #efefef 0 60%, #777 100%);
  color: var(--black);

  font-family: "Shrikhand", Georgia, serif;
  font-size: 1.35rem;
  text-decoration: none;

  box-shadow:
    0 12px 24px rgba(0,0,0,0.28),
    inset 0 0 18px rgba(255,255,255,0.36);

  animation: moonBreath 3.4s ease-in-out infinite;
}

/* ANIMATIONS */

@keyframes heartbeatPulse {
  0%,
  100% {
    transform: scale(1);
  }

  18% {
    transform: scale(1.13);
  }

  30% {
    transform: scale(0.98);
  }

  44% {
    transform: scale(1.08);
  }

  62% {
    transform: scale(1);
  }
}

@keyframes moonBreath {
  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.06);
  }
}

@keyframes archGlow {
  0%,
  100% {
    opacity: 0.46;
  }

  50% {
    opacity: 0.82;
  }
}
</style>
</head>

<body>
<main class="app">

  <input id="tinker-toggle" type="checkbox" />

  <section class="top-section">
    <h1 class="app-title">
      Mosaics<br>
      <span class="small-words">of the</span> Mind
    </h1>

    <div class="app-slogan">
      A Place for You to Shape Your Pieces Into Peace of Mind
    </div>
  </section>

  <label class="tinker-button" for="tinker-toggle" aria-label="Open Tinker menu">
    ✦
  </label>

  <div class="tinker-menu">
    <button type="button">Settings</button>
    <button type="button">Customization</button>
  </div>

  <section class="bottom-section">

    <a class="arch-link" href="horizons.html" aria-label="Open My Horizons">
      <svg class="arch-svg" viewBox="0 0 430 690" preserveAspectRatio="none" aria-hidden="true">

        <defs>
          <path
            id="archMainPath"
            d="M 7 690 L 7 275 C 7 28 423 28 423 275 L 423 690"
          />

          <path
            id="archTextPath"
            d="M 74 126 C 28 178 28 252 28 334 L 28 590"
          />
        </defs>

        <path class="arch-glow-path" d="M 7 690 L 7 275 C 7 28 423 28 423 275 L 423 690" />

        <path class="arch-band-outer" d="M 7 690 L 7 275 C 7 28 423 28 423 275 L 423 690" />
        <path class="arch-band-middle" d="M 7 690 L 7 275 C 7 28 423 28 423 275 L 423 690" />
        <path class="arch-band-inner" d="M 7 690 L 7 275 C 7 28 423 28 423 275 L 423 690" />

        <text class="arch-text">
          <textPath href="#archTextPath" startOffset="6%">
            MY HORIZONS
          </textPath>
        </text>

      </svg>
    </a>

    <a class="moon-link" href="moon.html" aria-label="Open Moon">
      Moon
    </a>

  </section>

</main>
</body>
</html>
