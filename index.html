<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mosaics of the Mind</title>

<style>
:root {
  --felt-bg: #9b5a36;
  --felt-bg-dark: #7f432b;
  --felt-shadow: #5f2f22;

  --arch-brown: #6f2f12;
  --arch-rust: #b85a25;
  --arch-gold: #d1a928;
  --arch-cream: #e6c676;

  --moon: #0f5c4e;
  --moon-light: #197765;

  --title: #6f2f12;
  --soft-ink: #2a1710;
  --glow: #ffdf65;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  overflow: hidden;
  background: #7d7871;
  font-family: Georgia, "Times New Roman", serif;
}

.app {
  position: relative;
  width: min(100vw, 430px);
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  color: var(--soft-ink);

  background:
    radial-gradient(circle at 20% 18%, rgba(255, 224, 154, 0.18), transparent 28%),
    radial-gradient(circle at 78% 82%, rgba(90, 38, 24, 0.26), transparent 34%),
    linear-gradient(145deg, var(--felt-bg), var(--felt-bg-dark));
}

.app::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.48;
  background-image:
    repeating-linear-gradient(
      22deg,
      rgba(255, 244, 214, 0.08) 0px,
      rgba(255, 244, 214, 0.08) 1px,
      transparent 1px,
      transparent 5px
    ),
    repeating-linear-gradient(
      102deg,
      rgba(61, 27, 17, 0.13) 0px,
      rgba(61, 27, 17, 0.13) 1px,
      transparent 1px,
      transparent 7px
    ),
    radial-gradient(circle at 50% 40%, rgba(255, 220, 164, 0.12), transparent 46%);
  mix-blend-mode: soft-light;
}

.app::after {
  content: "";
  position: absolute;
  inset: -20%;
  pointer-events: none;
  opacity: 0.25;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.18), transparent 35%),
    radial-gradient(ellipse at 70% 72%, rgba(42,18,10,.28), transparent 40%);
  filter: blur(18px);
}

.top-area {
  position: absolute;
  top: 26px;
  left: 20px;
  right: 92px;
  z-index: 5;
}

.app-name {
  margin: 0;
  color: var(--title);
  font-family: "Cooper Black", "Arial Rounded MT Bold", Georgia, serif;
  font-size: clamp(2.05rem, 10.8vw, 3.45rem);
  line-height: 0.78;
  letter-spacing: -0.045em;
  font-weight: 900;
  text-shadow:
    1px 1px 0 rgba(239, 194, 109, 0.55),
    3px 4px 0 rgba(79, 34, 20, 0.16),
    0 0 12px rgba(255, 220, 106, 0.18);
}

.app-name .tiny {
  font-size: 0.42em;
  letter-spacing: -0.02em;
}

.tagline {
  margin-top: 12px;
  max-width: 285px;
  color: rgba(42, 23, 16, 0.92);
  font-size: clamp(0.88rem, 3.85vw, 1.13rem);
  line-height: 1.12;
  font-style: italic;
  text-shadow: 0 1px 0 rgba(255, 230, 181, 0.15);
}

#tinker-toggle {
  display: none;
}

.tinker {
  position: absolute;
  top: 38px;
  right: 22px;
  width: 64px;
  height: 64px;
  z-index: 8;

  display: grid;
  place-items: center;

  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 24%, #fff6b7 0 14%, transparent 15%),
    radial-gradient(circle, #ffe56a 0 56%, #d3a828 57% 100%);
  color: var(--arch-brown);

  font-size: 2.1rem;
  font-family: Georgia, "Times New Roman", serif;
  text-decoration: none;

  box-shadow:
    0 0 15px rgba(255, 229, 106, 0.95),
    0 0 34px rgba(255, 229, 106, 0.45),
    0 10px 20px rgba(69, 29, 17, 0.24);

  animation: heartPulse 1.55s ease-in-out infinite;
}

.tinker-menu {
  display: none;
  position: absolute;
  top: 110px;
  right: 18px;
  width: 198px;
  padding: 12px;
  z-index: 9;
  border-radius: 22px;
  background: rgba(57, 27, 16, 0.86);
  box-shadow: 0 14px 30px rgba(45, 20, 12, 0.34);
  backdrop-filter: blur(8px);
}

.tinker-menu button {
  width: 100%;
  margin: 5px 0;
  border: 1px solid rgba(255, 229, 150, 0.48);
  border-radius: 15px;
  padding: 11px 10px;
  background: rgba(211, 168, 40, 0.17);
  color: #ffe9bc;
  font-size: 0.88rem;
}

#tinker-toggle:checked ~ .tinker-menu {
  display: block;
}

.arch-zone {
  position: absolute;
  left: 0;
  right: 0;
  bottom: -12px;
  height: 66vh;
  z-index: 3;
}

.arch {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 78%;
  height: 100%;
  transform: translateX(-50%);
  border-radius: 999px 999px 0 0;
  border: 16px solid var(--arch-brown);
  border-bottom: 0;
  animation: archGlow 3.8s ease-in-out infinite;
}

.arch::before {
  content: "";
  position: absolute;
  inset: 16px;
  border-radius: 999px 999px 0 0;
  border: 28px solid var(--arch-rust);
  border-bottom: 0;
}

.arch::after {
  content: "";
  position: absolute;
  inset: 58px;
  border-radius: 999px 999px 0 0;
  border: 24px solid var(--arch-gold);
  border-bottom: 0;
  box-shadow:
    0 0 0 16px var(--arch-cream),
    inset 0 0 24px rgba(255, 226, 121, 0.18);
}

.arch-label {
  position: absolute;
  left: 50%;
  top: 0;
  width: 82%;
  height: 178px;
  transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
  overflow: visible;
}

.arch-label text {
  fill: var(--arch-brown);
  font-family: "Cooper Black", "Arial Rounded MT Bold", Georgia, serif;
  font-size: 23px;
  font-weight: 800;
  letter-spacing: 1px;
  text-shadow: 0 0 9px rgba(255, 218, 103, 0.26);
}

.moon-zone {
  position: absolute;
  left: 50%;
  top: 53%;
  transform: translate(-50%, -50%);
  z-index: 6;
}

.moon-button {
  width: 132px;
  height: 132px;
  border: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 33% 25%, rgba(255, 255, 255, 0.13), transparent 24%),
    radial-gradient(circle, var(--moon) 0 62%, #0a4238 100%);
  color: #c79a83;

  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.82rem;
  font-style: italic;

  box-shadow:
    0 16px 30px rgba(45, 20, 12, 0.28),
    0 0 0 rgba(15, 92, 78, 0),
    inset 0 0 22px rgba(255, 255, 255, 0.08);

  animation: breathePulse 3.4s ease-in-out infinite;
}

@keyframes breathePulse {
  0%,
  100% {
    transform: scale(1);
    box-shadow:
      0 16px 30px rgba(45, 20, 12, 0.28),
      0 0 0 rgba(15, 92, 78, 0),
      inset 0 0 22px rgba(255, 255, 255, 0.08);
  }

  50% {
    transform: scale(1.055);
    box-shadow:
      0 19px 34px rgba(45, 20, 12, 0.3),
      0 0 34px rgba(15, 92, 78, 0.32),
      inset 0 0 26px rgba(255, 255, 255, 0.1);
  }
}

@keyframes heartPulse {
  0%,
  100% {
    transform: scale(1);
  }

  18% {
    transform: scale(1.13);
  }

  30% {
    transform: scale(0.98);
  }

  44% {
    transform: scale(1.08);
  }

  62% {
    transform: scale(1);
  }
}

@keyframes archGlow {
  0%,
  100% {
    filter:
      drop-shadow(0 0 10px rgba(255, 223, 101, 0.18))
      drop-shadow(0 10px 18px rgba(57, 24, 14, 0.22));
  }

  50% {
    filter:
      drop-shadow(0 0 24px rgba(255, 223, 101, 0.42))
      drop-shadow(0 14px 24px rgba(57, 24, 14, 0.26));
  }
}
</style>
</head>

<body>
<main class="app">
  <input id="tinker-toggle" type="checkbox" />

  <section class="top-area">
    <h1 class="app-name">
      Mosaics<br>
      <span class="tiny">of the</span> Mind
    </h1>

    <div class="tagline">
      A Place for You to Shape Your Pieces Into Peace of Mind
    </div>
  </section>

  <label class="tinker" for="tinker-toggle" aria-label="Tinker">
    ✦
  </label>

  <div class="tinker-menu">
    <button type="button">Customization</button>
    <button type="button">Settings</button>
  </div>

  <section class="arch-zone">
    <div class="arch"></div>

    <svg class="arch-label" viewBox="0 0 320 180" aria-hidden="true">
      <defs>
        <path id="archTextPath" d="M 42 146 C 62 46, 258 46, 278 146" />
      </defs>
      <text>
        <textPath href="#archTextPath" startOffset="50%" text-anchor="middle">
          MY HORIZONS
        </textPath>
      </text>
    </svg>
  </section>

  <section class="moon-zone">
    <button class="moon-button" type="button">
      Unfold
    </button>
  </section>
</main>
</body>
</html>
