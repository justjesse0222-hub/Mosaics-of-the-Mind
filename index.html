<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mosaics of the Mind</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Modak&family=Shrikhand&display=swap");

:root {
  --felt-bg: #9a5733;
  --felt-bg-dark: #7b3f2b;

  --arch-brown: #5f240f;
  --arch-rust: #b95725;
  --arch-gold: #d7ae20;
  --arch-cream: #e7c870;
  --arch-teal: #0f5f4f;

  --moon: #0f5c4e;
  --title: #682a12;
  --soft-ink: #2a1710;
  --glow: #ffdc58;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  overflow: hidden;
  background: #7d7871;
  font-family: Georgia, "Times New Roman", serif;
}

.app {
  position: relative;
  width: min(100vw, 430px);
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  color: var(--soft-ink);
  background:
    radial-gradient(circle at 16% 20%, rgba(255, 221, 150, 0.18), transparent 30%),
    radial-gradient(circle at 82% 78%, rgba(64, 28, 16, 0.24), transparent 34%),
    linear-gradient(145deg, var(--felt-bg), var(--felt-bg-dark));
}

.app::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.52;
  background-image:
    repeating-linear-gradient(
      22deg,
      rgba(255, 244, 214, 0.09) 0px,
      rgba(255, 244, 214, 0.09) 1px,
      transparent 1px,
      transparent 5px
    ),
    repeating-linear-gradient(
      104deg,
      rgba(58, 25, 15, 0.14) 0px,
      rgba(58, 25, 15, 0.14) 1px,
      transparent 1px,
      transparent 7px
    );
  mix-blend-mode: soft-light;
}

.app::after {
  content: "";
  position: absolute;
  inset: -20%;
  pointer-events: none;
  opacity: 0.26;
  background:
    radial-gradient(ellipse at 28% 20%, rgba(255,255,255,.18), transparent 35%),
    radial-gradient(ellipse at 72% 72%, rgba(42,18,10,.3), transparent 42%);
  filter: blur(18px);
}

/* APP NAME + SLOGAN */

.top-area {
  position: absolute;
  top: 24px;
  left: 18px;
  right: 18px;
  z-index: 5;
  text-align: center;
  padding-right: 72px;
  padding-left: 20px;
}

.app-name {
  margin: 0 auto;
  color: var(--title);
  font-family: "Modak", "Cooper Black", "Arial Rounded MT Bold", Georgia, serif;
  font-size: clamp(3.05rem, 15vw, 4.85rem);
  line-height: 0.72;
  letter-spacing: 0.01em;
  font-weight: 400;
  text-shadow:
    2px 2px 0 rgba(237, 197, 111, 0.52),
    4px 5px 0 rgba(79, 34, 20, 0.18);
}

.app-name .tiny {
  display: inline-block;
  font-size: 0.38em;
  transform: translateY(-0.1em);
}

.tagline {
  margin: 8px auto 0;
  max-width: 290px;
  color: rgba(42, 23, 16, 0.92);
  font-family: "Shrikhand", Georgia, serif;
  font-size: clamp(0.82rem, 3.4vw, 1.02rem);
  line-height: 1.15;
}

/* TINKER, LEFT ALONE */

#tinker-toggle {
  display: none;
}

.tinker {
  position: absolute;
  top: 38px;
  right: 22px;
  width: 64px;
  height: 64px;
  z-index: 8;

  display: grid;
  place-items: center;

  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 24%, #fff6b7 0 14%, transparent 15%),
    radial-gradient(circle, #ffe56a 0 56%, #d3a828 57% 100%);
  color: var(--arch-brown);

  font-size: 2.1rem;
  font-family: Georgia, "Times New Roman", serif;
  text-decoration: none;

  box-shadow:
    0 0 15px rgba(255, 229, 106, 0.95),
    0 0 34px rgba(255, 229, 106, 0.45),
    0 10px 20px rgba(69, 29, 17, 0.24);

  animation: heartPulse 1.55s ease-in-out infinite;
}

.tinker-menu {
  display: none;
  position: absolute;
  top: 110px;
  right: 18px;
  width: 198px;
  padding: 12px;
  z-index: 9;
  border-radius: 22px;
  background: rgba(57, 27, 16, 0.86);
  box-shadow: 0 14px 30px rgba(45, 20, 12, 0.34);
  backdrop-filter: blur(8px);
}

.tinker-menu button {
  width: 100%;
  margin: 5px 0;
  border: 1px solid rgba(255, 229, 150, 0.48);
  border-radius: 15px;
  padding: 11px 10px;
  background: rgba(211, 168, 40, 0.17);
  color: #ffe9bc;
  font-size: 0.88rem;
}

#tinker-toggle:checked ~ .tinker-menu {
  display: block;
}

/* ARCH BUTTON */

.arch-zone {
  position: absolute;
  left: 0;
  right: 0;
  bottom: -12px;
  height: 66vh;
  z-index: 3;
}

.arch-glow {
  position: absolute;
  left: 50%;
  bottom: -3px;
  width: 84%;
  height: 104%;
  transform: translateX(-50%);
  border-radius: 999px 999px 0 0;
  background: transparent;
  box-shadow:
    0 0 28px rgba(255, 220, 88, 0.44),
    0 0 58px rgba(255, 190, 54, 0.22),
    inset 0 0 28px rgba(255, 220, 88, 0.18);
  animation: archGlow 3.7s ease-in-out infinite;
}

.arch {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 78%;
  height: 100%;
  transform: translateX(-50%);
  border-radius: 999px 999px 0 0;
  border: 16px solid var(--arch-brown);
  border-bottom: 0;
}

.arch::before {
  content: "";
  position: absolute;
  inset: 16px;
  border-radius: 999px 999px 0 0;
  border: 28px solid var(--arch-rust);
  border-bottom: 0;
}

.arch::after {
  content: "";
  position: absolute;
  inset: 58px;
  border-radius: 999px 999px 0 0;
  border: 24px solid var(--arch-gold);
  border-bottom: 0;
  box-shadow:
    0 0 0 16px var(--arch-cream),
    inset 0 0 24px rgba(255, 226, 121, 0.18);
}

/* CURVED MY HORIZONS */

.arch-label {
  position: absolute;
  left: 50%;
  top: -13px;
  width: 88%;
  height: 210px;
  transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
  overflow: visible;
}

.arch-label text {
  fill: var(--arch-brown);
  font-family: "Shrikhand", "Cooper Black", Georgia, serif;
  font-size: 21px;
  font-weight: 400;
  letter-spacing: 1px;
}

/* MOON BUTTON */

.moon-zone {
  position: absolute;
  left: 50%;
  top: 61%;
  transform: translate(-50%, -50%);
  z-index: 6;
}

.moon-button {
  width: 112px;
  height: 112px;
  border: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 33% 25%, rgba(255, 255, 255, 0.13), transparent 24%),
    radial-gradient(circle, var(--moon) 0 62%, #0a4238 100%);
  color: #c79a83;

  font-family: "Shrikhand", Georgia, serif;
  font-size: 1.65rem;
  font-style: normal;

  box-shadow:
    0 16px 30px rgba(45, 20, 12, 0.28),
    0 0 0 rgba(15, 92, 78, 0),
    inset 0 0 22px rgba(255, 255, 255, 0.08);

  animation: breathePulse 3.4s ease-in-out infinite;
}

@keyframes breathePulse {
  0%,
  100% {
    transform: scale(1);
    box-shadow:
      0 16px 30px rgba(45, 20, 12, 0.28),
      0 0 0 rgba(15, 92, 78, 0),
      inset 0 0 22px rgba(255, 255, 255, 0.08);
  }

  50% {
    transform: scale(1.055);
    box-shadow:
      0 19px 34px rgba(45, 20, 12, 0.3),
      0 0 34px rgba(15, 92, 78, 0.32),
      inset 0 0 26px rgba(255, 255, 255, 0.1);
  }
}

@keyframes heartPulse {
  0%,
  100% {
    transform: scale(1);
  }

  18% {
    transform: scale(1.13);
  }

  30% {
    transform: scale(0.98);
  }

  44% {
    transform: scale(1.08);
  }

  62% {
    transform: scale(1);
  }
}

@keyframes archGlow {
  0%,
  100% {
    opacity: 0.72;
    filter: blur(0px);
  }

  50% {
    opacity: 1;
    filter: blur(1px);
  }
}
</style>
</head>

<body>
<main class="app">
  <input id="tinker-toggle" type="checkbox" />

  <section class="top-area">
    <h1 class="app-name">
      Mosaics<br>
      <span class="tiny">of the</span> Mind
    </h1>

    <div class="tagline">
      A Place for You to Shape Your Pieces Into Peace of Mind
    </div>
  </section>

  <label class="tinker" for="tinker-toggle" aria-label="Tinker">
    ✦
  </label>

  <div class="tinker-menu">
    <button type="button">Customization</button>
    <button type="button">Settings</button>
  </div>

  <section class="arch-zone">
    <div class="arch-glow"></div>
    <div class="arch"></div>

    <svg class="arch-label" viewBox="0 0 340 210" aria-hidden="true">
      <defs>
        <path id="archTextPath" d="M 36 178 C 58 28, 282 28, 304 178" />
      </defs>
      <text>
        <textPath href="#archTextPath" startOffset="50%" text-anchor="middle">
          MY HORIZONS
        </textPath>
      </text>
    </svg>
  </section>

  <section class="moon-zone">
    <button class="moon-button" type="button">
      Moon
    </button>
  </section>
</main>
</body>
</html>
